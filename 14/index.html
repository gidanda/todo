<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>TODOリスト</title>
</head>
<body>
  <div id="input">
    <label>
      TODO:
      <input id="todo" type="text">
    </label>
    <br>

    <label>
      優先度:
      <select id="priority">
        <option>低</option>
        <option selected>普</option>
        <option>高</option>
      </select>
    </label>

    <label>
      期日:
      <input id="deadline" type="date">
    </label>
    <br>

    <button id="submit" type="button">登録</button>
  </div>

  <table id="table"></table>

  <script src="script.js"></script>
</body>
</html>
